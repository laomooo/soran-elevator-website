<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - SORAN 索然电梯配件</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="icon" type="image/png" href="../images/favicon.png">
</head>
<body class="admin-body">

<div class="login-page" id="login-page">
    <div class="login-card">
        <div class="login-logo">
            <img src="../images/logo.png" alt="SORAN" id="login-logo" class="soran-logo">
            <h1>SORAN 管理后台</h1>
            <p>广州索然电梯配件有限公司 · 内容管理系统</p>
        </div>
        
        <form id="login-form" class="login-form">
            <div class="form-group">
                <label for="login-email">邮箱</label>
                <input type="email" id="login-email" placeholder="请输入管理员邮箱" required autofocus>
            </div>
            <div class="form-group">
                <label for="login-password">密码</label>
                <input type="password" id="login-password" placeholder="请输入密码" required>
            </div>
            <button type="submit">登录系统</button>
        </form>

        <div class="login-error" id="login-error"></div>
    </div>
</div>

<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script defer src="../js/supabase-client.js"></script>
<script defer src="js/admin.js"></script>
<script>
// Check if already logged in, redirect to dashboard
checkAuth().then(user => {
    if (user) {
        window.location.href = './';
    } else {
        document.querySelector('.admin-body').style.display = '';
        document.getElementById('login-logo').src = '../images/logo.png';
    }
});
</script>
</body>
</html>
